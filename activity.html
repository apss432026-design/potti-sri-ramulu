<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APSS | Potti SriRamulu Trust</title>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Telugu&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --saffron: #3E2522; --deep-saffron: #3E2522; --gold: #C8960A; --gold-light: #b59543;
      --forest: #3E2522; --forest-light: #3E2522; --cream: #FFF9F0; --off-white: #F7F2E8;
      --light-bg: #F5EDE8; --card-bg: #FFFFFF; --dark: #1A1208; --text: #2C1A0A;
      --text-muted: #6B5A3A; --white: #FFFFFF; --border: rgba(158, 103, 82, 0.18);
      --shadow: 0 4px 24px rgba(158, 103, 82, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }
    .header-wrapper { position: sticky; top: 0; z-index: 1000; }
    .lang-bar { background: var(--forest); padding: 6px 24px; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 4px 14px; cursor: pointer; font-family: 'Tiro Telugu', serif; font-size: 13px; border-radius: 20px; transition: all .3s; }
    .lang-btn.active, .lang-btn:hover { background: var(--gold); color: var(--forest); font-weight: 600; }
    header { background: linear-gradient(135deg, var(--forest) 0%, var(--forest-light) 60%, #C4876E 100%); box-shadow: 0 4px 20px rgba(0, 0, 0, .15); position: sticky; top: 36px; z-index: 999; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 100%; margin: 0; padding: 0; }
    .logo-area { display: flex; align-items: center; gap: 0; }
    .logo-img { height: 80px; width: auto; object-fit: contain; flex-shrink: 0; background: var(--cream); border: 1px solid var(--gold); border-right: none; cursor: pointer;}
    .center-banner-img { height: 80px; width: auto; object-fit: contain; max-width: 100%; }
    nav { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; padding-right: 20px;}
    nav a { color: rgba(255, 255, 255, .85); text-decoration: none; padding: 8px 12px; font-family: 'Tiro Telugu', serif; font-size: 14px; border-radius: 4px; transition: all .3s; position: relative; white-space: nowrap; }
    nav a::after { content: ''; position: absolute; bottom: 4px; left: 12px; right: 12px; height: 2px; background: var(--gold); transform: scaleX(0); transition: transform .3s; }
    nav a:hover { color: var(--gold-light); } nav a:hover::after { transform: scaleX(1); }
    .hamburger { display: none; background: none; border: none; color: white; font-size: 26px; cursor: pointer; }
    footer { background: #7A4E3E; color: rgba(255, 255, 255, .7); text-align: center; padding: 40px 20px; margin-top: auto;}
    .footer-title { font-family: 'Tiro Telugu', serif; font-size: 20px; color: var(--gold-light); margin-bottom: 8px; }
    .footer-sub { font-family: 'Poppins', sans-serif; font-size: 11px; letter-spacing: 2px; color: rgba(255, 255, 255, .45); margin-bottom: 20px; }
    .footer-copy { font-size: 13px; border-top: 1px solid rgba(255, 255, 255, .1); padding-top: 20px; margin-top: 20px; color: rgba(255, 255, 255, .4); }
    .en { display: none !important; } body.english .en { display: block !important; } body.english .te { display: none !important; }

    /* Activity Details Styles */
    main { min-height: 70vh; padding: 60px 0; }
    .container { max-width: 1000px; margin: 0 auto; }
    .activity-hero { text-align: center; margin-bottom: 40px; }
    .activity-title { font-family: 'Tiro Telugu', serif; font-size: clamp(28px, 4vw, 42px); color: var(--forest); margin-bottom: 12px; }
    .activity-image { display: block; max-width: 720px; max-height: 480px; width: auto; height: auto; margin: 0 auto 40px; border-radius: 12px; box-shadow: var(--shadow); border: 4px solid var(--gold); }
    .activity-desc { font-size: 20px; line-height: 1.8; color: var(--text); margin-bottom: 30px; }
    .activity-long-desc { font-size: 18px; line-height: 1.9; color: var(--text-muted); padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--saffron); white-space: pre-wrap; }
    .btn-back { display: inline-block; margin-top: 40px; background: transparent; color: var(--forest); padding: 12px 24px; border: 2px solid var(--forest); text-decoration: none; font-family: 'Tiro Telugu', serif; font-size: 16px; border-radius: 6px; transition: all .3s; }
    .btn-back:hover { background: var(--forest); color: white; }

    @media(max-width:900px) {
      .container { padding: 0 16px; }
      .logo-img, .center-banner-img { height: 50px; }
      .header-inner { padding: 10px 16px; position: relative; }
      .hamburger { display: block; z-index: 1001; margin-right: 15px; }
      nav { display: none; position: absolute; top: 100%; left: 0; right: 0; background: linear-gradient(135deg, var(--forest) 0%, #7A4E3E 100%); flex-direction: column; padding: 15px; gap: 5px; z-index: 1000; }
      nav.open { display: flex; }
      nav a { padding: 14px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); width: 100%; font-size: 16px; }
    }
  </style>
</head>
<body>

  <div class="header-wrapper">
    <div class="lang-bar">
      <button class="lang-btn active" id="btn-te" onclick="setLang('te')">తెలుగు</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
    </div>
    <header>
      <div class="header-inner">
        <div class="logo-area" onclick="location.href='index.html'" style="cursor:pointer;">
          <img class="logo-img" src="assets/logo.jpg" alt="APSS Logo">
          <img src="assets/banner.jpeg" alt="Telugu Banner" class="center-banner-img">
        </div>
        <button class="hamburger" onclick="toggleNav()">☰</button>
        <nav id="main-nav">
          <a href="index.html"><span class="te">హోమ్</span><span class="en">Home</span></a>
          <a href="index.html"><span class="te">కార్యక్రమాలు</span><span class="en">Activities</span></a>
        </nav>
      </div>
    </header>
  </div>

  <main>
    <div class="container" id="activity-detail-container">
      <!-- Content loaded here by JS -->
    </div>
  </main>

  <footer>
    <div class="footer-title te">పొట్టి శ్రీరాములు ట్రస్ట్</div>
    <div class="footer-title en">Potti Sriramulu Trust</div>
    <div class="footer-sub">Serving Andhra Pradesh</div>
    <p style="font-size:15px;max-width:600px;margin:0 auto 12px;color:rgba(255,255,255,.6)" class="te">అమరజీవి పొట్టి శ్రీరాములు స్మృతిలో — తెలుగు ప్రజల సేవలో నిరంతరం</p>
    <p style="font-size:15px;max-width:600px;margin:0 auto 12px;color:rgba(255,255,255,.6)" class="en">In memory of Amarajivi Potti Sriramulu — Forever in service of the Telugu people</p>
    <div class="footer-copy"><span style="color: var(--gold); font-weight: bold; letter-spacing: 1px;">Powered by WINWIN</span></div>
  </footer>

  <script>
    const API = 'https://potti-sri-ramulu-backend.vercel.app/api';
    function setLang(l) { document.body.classList.toggle('english', l === 'en'); document.getElementById('btn-en').classList.toggle('active', l === 'en'); document.getElementById('btn-te').classList.toggle('active', l !== 'en'); }
    function toggleNav() { document.getElementById('main-nav').classList.toggle('open'); }
    function esc(s) { return s == null ? '' : String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      const container = document.getElementById('activity-detail-container');

      try {
        const res = await fetch(API + '/activities/' + id);
        if (res.ok) {
          const activity = await res.json();
          container.innerHTML = `
            <div class="activity-hero">
              <h1 class="activity-title te">${esc(activity.tte)}</h1>
              <h1 class="activity-title en">${esc(activity.ten)}</h1>
            </div>
            ${activity.photo ? `<img src="${esc(activity.photo)}" class="activity-image" alt="Activity Photo">` : ''}
            <div class="activity-desc te">${esc(activity.dte)}</div>
            <div class="activity-desc en">${esc(activity.den)}</div>
            ${activity.ldte ? `<div class="activity-long-desc te">${esc(activity.ldte)}</div>` : ''}
            ${activity.lden ? `<div class="activity-long-desc en">${esc(activity.lden)}</div>` : ''}
            <div style="text-align: center;">
              <a href="index.html#activities" class="btn-back">
                <span class="te">← వెనుకకు వెళ్ళు</span><span class="en">← Go Back</span>
              </a>
            </div>
          `;
          return;
        }
      } catch (e) { console.error("Error loading activity", e); }

      container.innerHTML = `
        <div style="text-align: center; padding: 100px 20px;">
          <h2 style="color:var(--forest); font-family:'Tiro Telugu', serif; margin-bottom: 20px;">
            <span class="te">కార్యక్రమం కనుగొనబడలేదు</span><span class="en">Activity Not Found</span>
          </h2>
          <a href="index.html#activities" class="btn-back">
            <span class="te">← హోమ్‌కి వెళ్లండి</span><span class="en">← Go to Home</span>
          </a>
        </div>
      `;
    });
  </script>
</body>
</html>
